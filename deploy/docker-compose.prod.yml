# Reach production — nginx reverse proxy + API + Redis
# PostgreSQL: use managed DB (set DATABASE_URL) OR uncomment postgres service below.
#
# Usage:
#   cp deploy/env.production.example .env.production
#   # edit .env.production
#   docker compose -f deploy/docker-compose.prod.yml --env-file .env.production up -d --build

services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    env_file:
      - ../.env.production
    environment:
      NODE_ENV: production
      TRUST_PROXY: "true"
      HOST: "0.0.0.0"
      PORT: "3002"
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - reach

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - reach

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - reach_redis_prod:/data
    restart: unless-stopped
    networks:
      - reach

  # Uncomment for self-hosted PostgreSQL instead of managed DATABASE_URL
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER:-reach}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
  #     POSTGRES_DB: ${POSTGRES_DB:-reach}
  #   volumes:
  #     - reach_pg_prod:/var/lib/postgresql/data
  #   restart: unless-stopped
  #   networks:
  #     - reach

networks:
  reach:
    driver: bridge

volumes:
  reach_redis_prod:
  # reach_pg_prod:
