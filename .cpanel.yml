---
deployment:
  tasks:
    - /bin/mkdir -p tmp
    - /bin/mkdir -p apps/api/tmp
    - npm install 2>&1 || /usr/local/bin/npm install 2>&1
    - npm run build 2>&1 || /usr/local/bin/npm run build 2>&1
    - cd apps/api && npx prisma generate 2>&1
    - /bin/touch tmp/restart.txt
    - /bin/touch apps/api/tmp/restart.txt
